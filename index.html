<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <main>
        <section class="login">
            <div class="login__wrapper">
                <div class="login__img">
                    <img src="./img/foto.png" alt="">
                </div>
                <div class="login__context">
                    <div class="login__border"> 
                        <h1>Login</h1>
                        <hr>
                    </div>
                    <form action="/register">
                        <label for="ism">Username*</label>
                        <br>
                        <input id="ism" placeholder="Enter Your Username" type="text">
                        <br><br>
                        <label for="cod">Password*</label>
                        <br>
                        <input id="cod" placeholder="Enter Your Password" type="text">
                    </form>
                    <div class="login__checkbox">
                        <input id="chek" type="checkbox">
                        <label for="chek"> Remember me</label>
                    </div>
                    <button>LOGIN</button>
                    <div class="login__link">
                        <a href="">
                            <span>Forgot Password</span>
                        </a>
                        <br><br>
                        <a href="">
                            <span>Don't have  an account</span>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
